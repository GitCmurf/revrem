[profiles.default]
description = "Saved from RevRem CLI on 2026-05-05"

[profiles.default.pipeline]
max_iterations = 11
checks = ["pytest -q", "git diff --check"]

[profiles.default.review]
model = "gpt-5.5"
reasoning_effort = "medium"
timeout_seconds = 1800.0

[profiles.default.remediation]
model = "gpt-5.4-mini"
reasoning_effort = "medium"
timeout_seconds = 1800.0

[profiles.default.triage]
enabled = false
contract = "v2"

[profiles.default.triage.routing]
enabled = true
mode = "first-match"
default_route = "codex-midi"
allow_model_escalation = true
strict_on_unavailable_route = false

[[profiles.default.triage.routing.rule]]
id = "high-risk-frontier"
when.risk_level_min = "high"
then.route = "codex-frontier"

[[profiles.default.triage.routing.rule]]
id = "review-domain-frontier"
when.domain_tags_any = ["security", "review-classification"]
then.route = "codex-frontier"

[[profiles.default.triage.routing.rule]]
id = "review-safety-frontier"
when.safety_signals_any = ["sensitive-domain:security-review-routing"]
then.route = "codex-frontier"

[[profiles.default.triage.routing.rule]]
id = "multi-file-gemini"
when.module_count_gte = 4
then.route = "gemini-pro"

[profiles.default.triage.routes.codex-frontier]
harness = "codex"
model = "gpt-5.5"
reasoning_effort = "medium"
timeout_seconds = 0

[profiles.default.triage.routes.codex-midi]
harness = "codex"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
timeout_seconds = 0

[profiles.default.triage.routes.gemini-pro]
harness = "gemini"
model = "gemini-3.1-pro-preview"
reasoning_effort = "medium"
timeout_seconds = 0
fallback = "codex-midi"

[profiles.default.commit]
enabled = true

[profiles.default.output]
debug_status_detection = true
progress_style = "rich"
terminal_title = true

[profiles.dogfood]
description = "Project-local RevRem dogfood run with full verification, commits, diagnostics, and explicit phase models."

[profiles.dogfood.pipeline]
max_iterations = 3
checks = [
  "./.venv/bin/ruff check .",
  "./.venv/bin/mypy src",
  "lint-imports",
  "uv run --locked meminit check --format json",
  "./.venv/bin/pytest -q",
]

[profiles.dogfood.review]
harness = "codex"
model = "gpt-5.5"
reasoning_effort = "low"
timeout_seconds = 0

[profiles.dogfood.triage]
enabled = true
contract = "v2"
harness = "codex"
model = "gpt-5.5"
reasoning_effort = "low"
timeout_seconds = 0
on_invalid = "continue"

[profiles.dogfood.triage.routing]
enabled = true
mode = "first-match"
default_route = "codex-midi"
allow_model_escalation = true
strict_on_unavailable_route = false

[[profiles.dogfood.triage.routing.rule]]
id = "high-risk-frontier"
when.risk_level_min = "high"
then.route = "codex-frontier"

[[profiles.dogfood.triage.routing.rule]]
id = "review-domain-frontier"
when.domain_tags_any = ["security", "review-classification"]
then.route = "codex-frontier"

[[profiles.dogfood.triage.routing.rule]]
id = "review-safety-frontier"
when.safety_signals_any = ["sensitive-domain:security-review-routing"]
then.route = "codex-frontier"

[[profiles.dogfood.triage.routing.rule]]
id = "multi-file-gemini"
when.module_count_gte = 4
then.route = "gemini-pro"

[profiles.dogfood.triage.routes.codex-frontier]
harness = "codex"
model = "gpt-5.5"
reasoning_effort = "medium"
timeout_seconds = 0

[profiles.dogfood.triage.routes.codex-midi]
harness = "codex"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
timeout_seconds = 0

[profiles.dogfood.triage.routes.gemini-pro]
harness = "gemini"
model = "gemini-3.1-pro-preview"
reasoning_effort = "medium"
timeout_seconds = 0
fallback = "codex-midi"

[profiles.dogfood.remediation]
harness = "codex"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
timeout_seconds = 0

[profiles.dogfood.commit]
enabled = true
harness = "codex"
message_model = "gpt-5.3-codex-spark"
reasoning_effort = "low"
timeout_seconds = 0

[profiles.dogfood.output]
debug_status_detection = true
progress_style = "rich"
terminal_title = true
summary_format = "both"

[profiles.dogfood.runtime]
inner_check_retries = 1
provider_retry_attempts = 3
provider_retry_backoff_seconds = 5.0
