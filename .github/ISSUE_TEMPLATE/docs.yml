name: Documentation issue
description: Report unclear, stale, or missing documentation.
title: "docs: "
labels: ["docs", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Document or section
      description: Link or path to the relevant documentation.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested correction
    validations:
      required: false
