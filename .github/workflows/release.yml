name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate artifacts without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate release version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          ref_type = os.environ.get("GITHUB_REF_TYPE")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          init_text = Path("src/code_review_loop/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__ = "([^"]+)"$', init_text, re.MULTILINE)
          if match is None:
              raise SystemExit("__version__ not found")
          version = match.group(1)
          expected_tags = {f"v{version}"}
          if "rc" in version:
              expected_tags.add(f"v{version.replace('rc', '-rc')}")
          if ref_type == "tag" and ref_name not in expected_tags:
              raise SystemExit(f"release tag {ref_name!r} does not match package version {version!r}")
          print(f"version={version}")
          PY

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "meminit @ git+https://github.com/GitCmurf/meminit.git@63547bc79f46200d25e4b7375b5c661f64aa34f8"
          pytest -q
          ruff check .
          mypy src

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          rm -rf dist build src/revrem.egg-info src/code_review_loop.egg-info
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/revrem-sbom.cdx.json

      - name: Generate SHA-256 checksums
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          with Path("dist/SHA256SUMS").open("w", encoding="utf-8") as handle:
              for path in sorted(Path("dist").iterdir()):
                  if path.name == "SHA256SUMS" or not path.is_file():
                      continue
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  handle.write(f"{digest}  {path.name}\n")
          PY

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Sign release artifacts
        if: github.event_name == 'push' || inputs.dry_run == 'false'
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: dist/*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifacts
          path: dist/*

      - name: Stage release assets and clean dist for publishing
        run: |
          mkdir -p release-assets
          cp dist/* release-assets/
          cd dist && for f in *; do
            case "$f" in *.whl|*.tar.gz) ;; *) rm -f "$f" ;; esac
          done

      - name: Publish to TestPyPI
        if: github.event_name == 'push' && contains(github.ref_name, 'rc')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Publish to PyPI
        if: github.event_name == 'push' && !contains(github.ref_name, 'rc')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

      - name: Extract release notes from CHANGELOG
        if: github.event_name == 'push'
        run: |
          python - <<'PY'
          import os, re, pathlib
          ref = os.environ["GITHUB_REF_NAME"]            # e.g. v0.4.0 or v0.4.0-rc1
          version = ref[1:] if ref.startswith("v") else ref
          version = version.replace("-rc", "rc")          # CHANGELOG uses 0.4.0rc1 form if present
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)", text, re.M | re.S)
          notes = match.group(0).strip() if match else f"Release {ref}."
          pathlib.Path("release-notes.md").write_text(notes + "\n", encoding="utf-8")
          print(notes[:200])
          PY

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: release-assets/*
