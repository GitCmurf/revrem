name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"
  push:
    branches: [main]

# Top-level permissions must stay read-only: the scorecard-action's
# publish_results step verifies the OIDC token and rejects runs that grant
# write scopes globally. Write scopes are granted per-job below instead.
permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard.sarif
