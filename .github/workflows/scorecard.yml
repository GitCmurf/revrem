name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"
  push:
    branches: [main]

# Top-level permissions must stay read-only: the scorecard-action's
# publish_results step verifies the OIDC token and rejects runs that grant
# write scopes globally. Write scopes are granted per-job below instead.
permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@ce28f5bb42b7a9f2c824e633a3f6ee835bab6858 # v3.29.0
        with:
          sarif_file: scorecard.sarif
