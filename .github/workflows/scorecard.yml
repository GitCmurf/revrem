name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 4 * * 1"
  push:
    branches: [main]

# Top-level permissions must stay read-only: the scorecard-action's
# publish_results step verifies the OIDC token and rejects runs that grant
# write scopes globally. Write scopes are granted per-job below instead.
permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard.sarif
