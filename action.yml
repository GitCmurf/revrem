name: revrem
description: Run a RevRem code-review remediation loop on a pull request and post a single updatable comment with the results.
author: GitCmurf
branding:
  icon: check-circle
  color: green

inputs:
  base:
    description: Git ref to review against (e.g. origin/main). The caller must checkout with fetch-depth 0.
    default: origin/main
  profile:
    description: RevRem profile to run.
    default: default
  max-iterations:
    description: Override the profile's max iterations.
    default: ""
  max-wall-seconds:
    description: Wall-clock budget in seconds.
    default: ""
  max-usd:
    description: USD cost ceiling.
    default: ""
  max-tokens:
    description: Token budget ceiling.
    default: ""
  checks:
    description: Newline-separated check commands (one per line), overriding the profile.
    default: ""
  comment:
    description: Post an idempotent PR comment summarizing the run.
    default: "true"
  upload-artifacts:
    description: Upload the redacted HTML report as a workflow artifact.
    default: "true"
  raw-artifacts:
    description: >-
      Also upload the full run directory verbatim. WARNING: this is NOT redacted
      — it contains raw prompts, model output, check output, and local paths.
      Only enable on trusted repos. (The HTML/JSON report from upload-artifacts
      is redacted; this raw bundle is not.)
    default: "false"
  fail-on-findings:
    description: Fail the job when RevRem exits 2 (findings remain).
    default: "false"
  install-mode:
    description: How to install revrem — "pypi" (published) or "local" (this repo, for dogfooding).
    default: "pypi"
  revrem-version:
    description: "revrem version to install from PyPI (install-mode: pypi only)."
    default: "0.5.0"
  github-token:
    description: >-
      GitHub token for posting the PR comment. Leave unset to use the automatic
      GitHub token (resolved in the comment step); override to use a PAT
      or app token. The default is intentionally empty — not an expression — so
      the comment step fallback resolves
      correctly regardless of how GitHub handles expressions in input defaults.
    default: ""

runs:
  using: composite
  steps:
    # SECURITY: every workflow input is passed through `env:` and read as a
    # shell variable ("$VAR"), never interpolated as `${{ inputs.x }}` inside a
    # run script. GitHub expands `${{ }}` into the script *text* before bash
    # parses it, so direct interpolation of caller-controlled input is a
    # script-injection vector (https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections).
    - name: Install revrem
      shell: bash
      env:
        INSTALL_MODE: ${{ inputs.install-mode }}
        REVREM_VERSION: ${{ inputs.revrem-version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        if [[ "$INSTALL_MODE" == "local" ]]; then
          pip install -e "$ACTION_PATH"
        else
          pip install "revrem==$REVREM_VERSION"
        fi
        revrem --version

    - name: Verify base ref exists
      shell: bash
      env:
        BASE: ${{ inputs.base }}
      run: |
        set -euo pipefail
        if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
          echo "::error::Base ref '$BASE' not found. Checkout with fetch-depth: 0."
          exit 4
        fi

    - name: Run revrem
      id: revrem
      shell: bash
      env:
        BASE: ${{ inputs.base }}
        PROFILE: ${{ inputs.profile }}
        MAX_ITERATIONS: ${{ inputs.max-iterations }}
        MAX_WALL_SECONDS: ${{ inputs.max-wall-seconds }}
        MAX_USD: ${{ inputs.max-usd }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        CHECKS: ${{ inputs.checks }}
      run: |
        set -uo pipefail
        # Validate optional numeric budgets up front: empty or a number only.
        for pair in "max-iterations=$MAX_ITERATIONS" "max-wall-seconds=$MAX_WALL_SECONDS" \
                    "max-usd=$MAX_USD" "max-tokens=$MAX_TOKENS"; do
          name="${pair%%=*}"; val="${pair#*=}"
          if [[ -n "$val" && ! "$val" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Input '$name' must be numeric; got '$val'."
            exit 4
          fi
        done
        ARGS=(--base "$BASE" --profile "$PROFILE" --no-tty --progress-style compact --summary-format json)
        if [[ -n "$MAX_ITERATIONS" ]]; then ARGS+=(--max-iterations "$MAX_ITERATIONS"); fi
        if [[ -n "$MAX_WALL_SECONDS" ]]; then ARGS+=(--max-wall-seconds "$MAX_WALL_SECONDS"); fi
        if [[ -n "$MAX_USD" ]]; then ARGS+=(--max-usd "$MAX_USD"); fi
        if [[ -n "$MAX_TOKENS" ]]; then ARGS+=(--max-tokens "$MAX_TOKENS"); fi
        # Split newline-separated checks into repeated --check flags, read from
        # the env var (never interpolate the joined string — injection vector).
        while IFS= read -r line; do
          [[ -n "$line" ]] && ARGS+=(--check "$line")
        done <<< "$CHECKS"

        set +e
        revrem "${ARGS[@]}" > revrem-out.json 2> revrem-err.txt
        REVREM_EXIT=$?
        set -e
        echo "revrem-exit=$REVREM_EXIT" >> "$GITHUB_OUTPUT"

        # Two-stage guard: stdout must be valid JSON AND carry a top-level
        # artifact_dir (always present on a completed run). If revrem crashed
        # before writing a summary, fast-fail here rather than globbing runs/.
        if ! RUN_DIR=$(python3 -c "import json,sys; d=json.load(open('revrem-out.json')); print(d['artifact_dir'])" 2>/dev/null); then
          echo "::error::RevRem did not produce a parseable run summary. It may have crashed during setup."
          echo "::group::revrem stderr"
          cat revrem-err.txt || true
          echo "::endgroup::"
          exit 4
        fi
        echo "run-dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
        echo "REVREM_RUN_DIR=$RUN_DIR" >> "$GITHUB_ENV"

    - name: Render report
      if: always() && env.REVREM_RUN_DIR != ''
      shell: bash
      run: |
        set -euo pipefail
        revrem report "$REVREM_RUN_DIR" --output revrem-report.html
        revrem report "$REVREM_RUN_DIR" --format json > revrem-report.json

    - name: Upload report artifact
      if: always() && env.REVREM_RUN_DIR != '' && inputs.upload-artifacts == 'true'
      id: upload-report
      uses: actions/upload-artifact@v4
      with:
        name: revrem-report
        path: revrem-report.html

    - name: Export artifact URL
      if: always() && env.REVREM_RUN_DIR != '' && inputs.upload-artifacts == 'true'
      shell: bash
      env:
        ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
      run: |
        # upload-artifact exposes artifact-url on its outputs; fall back to the
        # run URL (set on the comment step) when upload was skipped or empty.
        # Routed through env: to stay consistent with this file's injection-
        # hardening policy (never interpolate expressions directly into a run script).
        echo "REVREM_ARTIFACT_URL=$ARTIFACT_URL" >> "$GITHUB_ENV"

    - name: Upload raw run directory
      if: always() && env.REVREM_RUN_DIR != '' && inputs.raw-artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: revrem-run
        path: ${{ env.REVREM_RUN_DIR }}

    - name: Post PR comment
      # NB: compare the boolean to `false`, not the string 'true'. Under GHA's
      # type coercion `head.repo.fork != 'true'` is ALWAYS true (boolean true→1,
      # string 'true'→NaN, 1 != NaN), so the fork guard never fired. `== false`
      # blocks fork PRs (where the token is read-only) as intended. The
      # `github.event.pull_request &&` guard keeps this step safe on non-PR
      # triggers (push/workflow_dispatch), where `.head` would otherwise be a
      # null-property evaluation error.
      if: always() && env.REVREM_RUN_DIR != '' && inputs.comment == 'true' && github.event.pull_request && github.event.pull_request.head.repo.fork == false
      shell: bash
      env:
        # The github-token input defaults to "" (empty, NOT an expression), so
        # when the caller omits it `inputs.github-token` is falsy and this
        # `|| github.token` fallback resolves to the automatic token — evaluated
        # here in the step, where expressions are honoured. A non-empty literal
        # default would be truthy and defeat the fallback, sending a bad token.
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REVREM_ARTIFACT_URL: ${{ env.REVREM_ARTIFACT_URL }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        python3 "$ACTION_PATH/scripts/ci/post_pr_comment.py"

    - name: Map exit code
      if: always()
      shell: bash
      env:
        EXIT: ${{ steps.revrem.outputs.revrem-exit }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set -uo pipefail
        case "${EXIT:-}" in
          0)
            echo "RevRem: clear."
            exit 0
            ;;
          2)
            if [[ "$FAIL_ON_FINDINGS" == "true" ]]; then
              echo "::error::RevRem found findings that remain."
              exit 1
            fi
            echo "::warning::RevRem found findings that remain. See the report artifact."
            exit 0
            ;;
          3)
            echo "::error::RevRem hit a budget ceiling (tokens, cost, or wall-clock)."
            cat revrem-err.txt 2>/dev/null || true
            exit 1
            ;;
          4|5)
            echo "::error::RevRem exited with code $EXIT."
            echo "::group::revrem stderr"
            cat revrem-err.txt || true
            echo "::endgroup::"
            exit 1
            ;;
          *)
            echo "::error::RevRem exited with unexpected code $EXIT."
            cat revrem-err.txt 2>/dev/null || true
            exit 1
            ;;
        esac
