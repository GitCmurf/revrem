exclude: ^\.agents/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: ./scripts/dev-python -m pytest -q
        language: system
        pass_filenames: false
      - id: meminit-check
        name: meminit check
        entry: meminit check --format json
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: ./scripts/dev-python -m mypy src
        language: system
        pass_filenames: false
      - id: diff-check
        name: git diff --check
        entry: git diff --check
        language: system
        pass_filenames: false
